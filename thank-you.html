    <style>
        .thank-you-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: radial-gradient(circle at 0% 0%, #8b5cf6 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, #f59e0b 0%, transparent 40%);
        }
        .thank-you-card {
            background: rgba(255, 255, 10, 0.05); /* Slightly yellow tint for celebration */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem 2rem;
            border-radius: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .success-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            display: block;
        }

    <!-- Google Tag Manager (noscript) -->

    <div class="thank-you-container fade-in">
        <div class="thank-you-card">
            <span class="success-icon">🌸</span>
            <h1 class="event-title" style="margin-top: 0; font-size: 3.5rem;">See You at the <span>Bloom</span>!</h1>
            <p class="context-info" style="margin-top: 2rem; font-size: 1.2rem;">Your tickets have been confirmed.</p>
            <p style="margin-top: 1rem; color: #94a3b8;">Check your email for details. We can't wait to see you on April 18th!</p>

    <footer class="footer-text">
        BLOOM SPIRIT x FUTURE SOUND EXPERIENCE x ALT SPACES
    </footer>

    <script>
        // Reveal elements
        document.addEventListener('DOMContentLoaded', () => {
            const el = document.querySelector('.fade-in');
            el.style.opacity = 1;
            el.style.transform = 'translateY(0)';
        });
    </script>
